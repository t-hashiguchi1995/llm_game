# ─── type: 種別（Conventional Commits と対応）───
- name: "type: bug"
  color: "d73a4a"
  description: "\U0001F41B バグ報告・修正 (fix)"
- name: "type: feature"
  color: "0075ca"
  description: "✨ 新機能の追加 (feat)"
- name: "type: enhancement"
  color: "84b6eb"
  description: "\U0001F4A1 既存機能の改善・拡張"
- name: "type: refactor"
  color: "e4e669"
  description: "♻️ リファクタリング（挙動変更なし）"
- name: "type: perf"
  color: "ffd700"
  description: "⚡ パフォーマンス改善"
- name: "type: test"
  color: "bfd4f2"
  description: "\U0001F9EA テストの追加・修正"
- name: "type: docs"
  color: "0052cc"
  description: "\U0001F4D6 ドキュメントの更新"
- name: "type: ci"
  color: "f9d0c4"
  description: "⚙️ CI/CD の変更"
- name: "type: build"
  color: "e99695"
  description: "\U0001F528 ビルド・依存関係の変更"
- name: "type: chore"
  color: "ededed"
  description: "\U0001F5C2️ 雑務（設定・スクリプト等）"
- name: "type: revert"
  color: "b60205"
  description: "⏪ コミット・変更の取り消し"
- name: "type: task"
  color: "c2e0c6"
  description: "\U0001F4CB 開発タスク・作業チケット"
- name: "type: question"
  color: "d876e3"
  description: "❓ 質問・仕様確認"

# ─── status: 対応状態 ───
- name: "status: triage"
  color: "fef2c0"
  description: "\U0001F50D 内容確認・分類待ち"
- name: "status: in progress"
  color: "fbca04"
  description: "\U0001F6A7 対応中"
- name: "status: review"
  color: "0e8a16"
  description: "\U0001F440 レビュー待ち・レビュー中"
- name: "status: blocked"
  color: "b60205"
  description: "\U0001F6AB 他タスク待ちなどでブロック中"
- name: "status: on hold"
  color: "e4e669"
  description: "⏸️ 一時保留"
- name: "status: wont fix"
  color: "ffffff"
  description: "\U0001F645 対応しないと判断"
- name: "status: duplicate"
  color: "cfd3d7"
  description: "\U0001F501 他Issueと重複"

# ─── priority: 優先度 ───
- name: "priority: critical"
  color: "b60205"
  description: "\U0001F525 最優先・即時対応が必要"
- name: "priority: high"
  color: "e4312b"
  description: "⬆️ 優先度高"
- name: "priority: medium"
  color: "fbca04"
  description: "➡️ 優先度中（通常対応）"
- name: "priority: low"
  color: "0e8a16"
  description: "⬇️ 優先度低・余裕があれば対応"

# ─── scope: 影響範囲 ───
- name: "scope: frontend"
  color: "c5def5"
  description: "\U0001F5A5️ フロントエンド"
- name: "scope: backend"
  color: "1d76db"
  description: "\U0001F527 バックエンド"
- name: "scope: infra"
  color: "5319e7"
  description: "☁️ インフラ・デプロイ"
- name: "scope: security"
  color: "b60205"
  description: "\U0001F512 セキュリティ"
- name: "scope: database"
  color: "0075ca"
  description: "\U0001F5C4️ データベース"
- name: "scope: api"
  color: "84b6eb"
  description: "\U0001F50C API"

# ─── 特殊ラベル ───
- name: "breaking change"
  color: "b60205"
  description: "\U0001F4A5 後方互換性を壊す変更を含む"
- name: "good first issue"
  color: "7057ff"
  description: "\U0001F44B 初めてのコントリビューターに適したIssue"
- name: "help wanted"
  color: "008672"
  description: "\U0001F64F 助けを求めています"
