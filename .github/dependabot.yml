version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    cooldown:
      default-days: 7       # 公開7日後から PR 作成（不安定バージョン回避）
      semver-major-days: 30  # minor/patch に適用（major は ignore で完全ブロック）
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    cooldown:
      default-days: 7
      semver-major-days: 30
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    cooldown:
      default-days: 7
      semver-major-days: 30

  # OPTIONAL: Terraform を使わない場合はこのブロックを削除してください
  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    cooldown:
      default-days: 7
      semver-major-days: 30
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
