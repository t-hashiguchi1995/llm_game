# OPTIONAL: OSSF Scorecard が不要な場合は security-scorecard.yml ごと削除してください
name: OSSF Scorecard (Reusable)

on:
  workflow_call:

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: OSSF Scorecard スキャン
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75736b0b6d  # v2.4.0
        with:
          results_format: sarif
          results_file: results.sarif
          publish_results: false

      - name: スコアを表示
        if: always()
        run: |
          if [ -f results.sarif ]; then
            echo "=== OSSF Scorecard 結果 ==="
            python3 << 'ENDPYTHON'
          import json
          with open("results.sarif") as f:
              data = json.load(f)
          props = data.get("runs", [{}])[0].get("properties", {})
          score = props.get("scorecard", {}).get("score", "N/A")
          print(f"スコア: {score} / 10")
          checks = props.get("scorecard", {}).get("checks", [])
          for c in checks:
              name = c.get("name", "")
              s = c.get("score", "N/A")
              reason = c.get("reason", "")
              print(f"  {name}: {s} - {reason}")
          ENDPYTHON
          fi

      - name: SARIF アップロード (GHAS 有効リポジトリのみ成功)
        uses: github/codeql-action/upload-sarif@97b2460c8117ea01d24a916e33184ec444ad0d82  # v3.26.0
        if: always()
        continue-on-error: true
        with:
          sarif_file: results.sarif
