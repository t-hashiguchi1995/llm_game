name: Terraform Validate

# 【設計方針】
# harness-health.sh = 認証不要チェック（ローカル）
# このワークフロー = terraform init / validate / plan（CI側で担保）
#
# 実行タイミング:
# - infra/ 変更を含む PR / push（変更検知）
# - 毎週月曜 9:00 JST（スケジュール実行）← インフラの腐敗を定期検出

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  pull_request:
    paths:
      - 'infra/**'
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 00:00 UTC = 09:00 JST

env:
  TF_DIR: infra/environments/dev
  REGION: asia-northeast1

jobs:
  terraform-validate:
    name: Terraform init / validate / plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # Workload Identity に必須
      contents: read
      pull-requests: write   # PR コメント投稿

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── GCP 認証（Workload Identity）──────────────────────────
      - name: GCP 認証
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_PLAN }}

      # ── Terraform セットアップ ────────────────────────────────
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ">= 1.5"

      # ── tflint（静的解析）────────────────────────────────────
      - name: tflint セットアップ
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6  # v4

      - name: tflint 実行
        id: tflint
        run: tflint --recursive --chdir=infra/
        continue-on-error: true  # 後続ステップで結果をコメントするため

      # ── terraform fmt（フォーマット確認）──────────────────────
      # harness-health.sh と同じチェックを CI でも実施（二重確認）
      - name: terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive infra/
        continue-on-error: true  # 後続ステップで結果をコメントするため

      # ── terraform init ────────────────────────────────────────
      # harness-health.sh では実施不可（認証必要）→ CI でのみ担保
      - name: terraform init
        id: init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -input=false

      # ── terraform validate ────────────────────────────────────
      # init 後でないと動かないため CI でのみ担保
      - name: terraform validate
        id: validate
        run: terraform -chdir=${{ env.TF_DIR }} validate -no-color

      # ── terraform plan ────────────────────────────────────────
      - name: terraform plan
        id: plan
        run: |
          terraform -chdir=${{ env.TF_DIR }} plan \
            -no-color \
            -input=false \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="github_repo=${{ vars.GH_REPO }}" \
            -var="app_name=${{ vars.APP_NAME }}" \
            -var="billing_account_id=${{ secrets.BILLING_ACCOUNT_ID }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="region=${{ env.REGION }}" \
            2>&1 | tee /tmp/plan_output.txt
        continue-on-error: true

      # ── PR にコメント投稿 ─────────────────────────────────────
      - name: PR にチェック結果をコメント
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          TFLINT_OUTCOME:   ${{ steps.tflint.outcome }}
          FMT_OUTCOME:      ${{ steps.fmt.outcome }}
          INIT_OUTCOME:     ${{ steps.init.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PLAN_OUTCOME:     ${{ steps.plan.outcome }}
        with:
          script: |
            const { TFLINT_OUTCOME, FMT_OUTCOME, INIT_OUTCOME, VALIDATE_OUTCOME, PLAN_OUTCOME } = process.env;
            const icon = (o) => o === 'success' ? '✅' : '❌';

            const fs = require('fs');
            const planOutput = fs.existsSync('/tmp/plan_output.txt')
              ? fs.readFileSync('/tmp/plan_output.txt', 'utf8').slice(-10000)
              : '(出力なし)';

            const body = [
              '## Terraform チェック結果',
              '',
              `| チェック | 結果 |`,
              `|----------|------|`,
              `| \`tflint\`   | ${icon(TFLINT_OUTCOME)} ${TFLINT_OUTCOME} |`,
              `| \`fmt\`      | ${icon(FMT_OUTCOME)} ${FMT_OUTCOME} |`,
              `| \`init\`     | ${icon(INIT_OUTCOME)} ${INIT_OUTCOME} |`,
              `| \`validate\` | ${icon(VALIDATE_OUTCOME)} ${VALIDATE_OUTCOME} |`,
              `| \`plan\`     | ${icon(PLAN_OUTCOME)} ${PLAN_OUTCOME} |`,
              '',
              '<details><summary>terraform plan の出力</summary>',
              '',
              '```hcl',
              planOutput,
              '```',
              '</details>',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      # ── tflint / fmt / validate / plan のいずれかが失敗したらジョブ失敗 ─
      - name: 結果の確定
        if: >
          steps.tflint.outcome == 'failure' ||
          steps.fmt.outcome == 'failure' ||
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.plan.outcome == 'failure'
        run: |
          echo "❌ 以下のステップが失敗しました:"
          echo "  tflint:   ${{ steps.tflint.outcome }}"
          echo "  fmt:      ${{ steps.fmt.outcome }}"
          echo "  init:     ${{ steps.init.outcome }}"
          echo "  validate: ${{ steps.validate.outcome }}"
          echo "  plan:     ${{ steps.plan.outcome }}"
          exit 1